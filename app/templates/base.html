<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Склад{% endblock %} — МУП «Водоканал» г. Ростов-на-Дону</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --brand-blue: #0a2e52;
            --brand-cyan: #0090d4;
            --brand-light: #e8f4fb;
            --brand-accent: #00c4a7;
            --sidebar-w: 260px;
            --font: 'IBM Plex Sans', sans-serif;
            --mono: 'IBM Plex Mono', monospace;
        }

        * { box-sizing: border-box; }

        body {
            font-family: var(--font);
            background: #f0f4f8;
            color: #1a2332;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ───────── SIDEBAR ───────── */
        .sidebar {
            position: fixed;
            top: 0; left: 0; bottom: 0;
            width: var(--sidebar-w);
            background: var(--brand-blue);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            overflow-y: auto;
            transition: transform 0.3s ease;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 999;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        /* ───────── MAIN ───────── */
        .main-wrap {
            margin-left: var(--sidebar-w);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: margin 0.3s ease;
        }

        .topbar {
            background: #fff;
            border-bottom: 1px solid #dde3ec;
            padding: 0 28px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 22px;
            color: var(--brand-blue);
        }

        .content {
            padding: 28px;
            flex: 1;
        }

        /* ───────── TABLE RESPONSIVE ───────── */
        .data-table {
            overflow-x: auto;
        }

        /* ───────── CARDS GRID ───────── */
        .row {
            row-gap: 16px;
        }

        /* ───────── MOBILE ADAPTATION ───────── */
        @media (max-width: 992px) {

            .main-wrap {
                margin-left: 0;
            }

            .menu-btn {
                display: block;
            }

            .sidebar {
                transform: translateX(-100%);
                width: 280px;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .sidebar-overlay.active {
                display: block;
            }

            .content {
                padding: 16px;
            }

            .topbar {
                padding: 0 16px;
            }

            .stat-value {
                font-size: 26px;
            }
        }

        @media (max-width: 576px) {
            .stat-value {
                font-size: 22px;
            }

            .card-block {
                padding: 16px;
            }

            .topbar-title {
                font-size: 14px;
            }
        }

        /* ====== (ОСТАЛЬНОЙ ТВОЙ CSS БЕЗ ИЗМЕНЕНИЙ) ====== */
        :root {
            --brand-blue: #0a2e52;
            --brand-cyan: #0090d4;
            --brand-light: #e8f4fb;
            --brand-accent: #00c4a7;
            --sidebar-w: 260px;
            --font: 'IBM Plex Sans', sans-serif;
            --mono: 'IBM Plex Mono', monospace;
        }

        * { box-sizing: border-box; }

        body { font-family: var(--font); background:#f0f4f8; }

        /* --- оставь остальной твой CSS без изменений --- */
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

<!-- OVERLAY -->
<div class="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <div class="drop-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <path d="M12 2C6 9 4 13 4 16a8 8 0 0016 0c0-3-2-7-8-14z"/>
            </svg>
        </div>
        <div class="org-name">МУП «Водоканал»</div>
        <div class="org-sub">г. Ростов-на-Дону<br>Учёт товаров на складе</div>
    </div>

    <nav>
        <div class="nav-section-title">Главное</div>
        <a href="{{ url_for('main.dashboard') }}" class="nav-link">Дашборд</a>
        <a href="{{ url_for('products.index') }}" class="nav-link">Товары</a>
        <a href="{{ url_for('suppliers.index') }}" class="nav-link">Поставщики</a>
    </nav>
</aside>

<!-- MAIN -->
<div class="main-wrap">

    <header class="topbar">
        <button class="menu-btn" onclick="toggleSidebar()">
            <i class="bi bi-list"></i>
        </button>

        <div class="topbar-title">{% block page_title %}{% endblock %}</div>

        <div class="topbar-user">
            {% if current_user.is_authenticated %}
            <div class="user-avatar">{{ current_user.full_name[0] }}</div>
            {% endif %}
        </div>
    </header>

    <main class="content">
        {% block content %}{% endblock %}
    </main>
</div>

<script>
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.querySelector('.sidebar-overlay');

        sidebar.classList.toggle('open');
        overlay.classList.toggle('active');
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
